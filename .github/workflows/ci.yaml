name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.prettierignore'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.prettierignore'

jobs:
  build-and-validate:
    name: Validate and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.0
          cache: 'npm' 

      - name: Install Dependencies
        run: npm ci

      - name: Run Validation
        run: npm run validate

      - name: Build Application
        run: npm run build